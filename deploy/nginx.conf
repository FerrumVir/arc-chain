# ARC Chain — Nginx Reverse Proxy
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/arc-chain
#   sudo ln -s /etc/nginx/sites-available/arc-chain /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

upstream arc_node {
    server 127.0.0.1:9090;
}

upstream arc_explorer {
    server 127.0.0.1:3100;
}

# Redirect HTTP → HTTPS (uncomment after certbot)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment after certbot
    server_name your-domain.com;

    # SSL (certbot will add these automatically)
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Explorer (main site)
    location / {
        proxy_pass http://arc_explorer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR / WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Node RPC (public API)
    location /rpc/ {
        proxy_pass http://arc_node/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Rate limit the public RPC
        limit_req zone=rpc burst=20 nodelay;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://arc_explorer;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# Rate limiting zone (place in http {} block of /etc/nginx/nginx.conf)
# limit_req_zone $binary_remote_addr zone=rpc:10m rate=10r/s;
