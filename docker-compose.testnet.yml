# ARC Chain — 4-node testnet deployment
# Usage: docker compose -f docker-compose.testnet.yml up

services:
  node-0:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "9090:9090"
      - "8545:8545"
    command:
      - arc-node
      - --seed
      - arc-validator-0
      - --stake
      - "50000000"
      - --config
      - /etc/arc/config.toml
      - --genesis
      - /etc/arc/genesis.toml
      - --eth-port
      - "8545"
    volumes:
      - node0-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  node-1:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "9091:9090"
    command:
      - arc-node
      - --seed
      - arc-validator-1
      - --stake
      - "50000000"
      - --config
      - /etc/arc/config.toml
      - --genesis
      - /etc/arc/genesis.toml
      - --peers
      - node-0:9091
    volumes:
      - node1-data:/data
    depends_on:
      node-0:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  node-2:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "9092:9090"
    command:
      - arc-node
      - --seed
      - arc-validator-2
      - --stake
      - "50000000"
      - --config
      - /etc/arc/config.toml
      - --genesis
      - /etc/arc/genesis.toml
      - --peers
      - node-0:9091
    volumes:
      - node2-data:/data
    depends_on:
      node-0:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  node-3:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "9093:9090"
    command:
      - arc-node
      - --seed
      - arc-validator-3
      - --stake
      - "50000000"
      - --config
      - /etc/arc/config.toml
      - --genesis
      - /etc/arc/genesis.toml
      - --peers
      - node-1:9091
    volumes:
      - node3-data:/data
    depends_on:
      node-1:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  explorer:
    build:
      context: ./explorer
    ports:
      - "3100:80"
    environment:
      - VITE_API_URL=http://node-0:9090
    depends_on:
      node-0:
        condition: service_healthy
    restart: unless-stopped

volumes:
  node0-data:
  node1-data:
  node2-data:
  node3-data:
