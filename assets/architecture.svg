<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="net" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cons" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="state" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="vm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gpu" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="inf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="crypto" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="700" height="500" rx="12" fill="#0f172a"/>
  <text x="350" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">ARC Chain Architecture</text>
  <text x="350" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">14 crates, 99,000+ lines of Rust</text>

  <!-- Users/Agents -->
  <rect x="250" y="62" width="200" height="30" rx="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="350" y="82" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Users / AI Agents</text>

  <!-- Arrow -->
  <line x1="350" y1="92" x2="350" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Networking -->
  <rect x="50" y="108" width="600" height="50" rx="8" fill="url(#net)" opacity="0.9"/>
  <text x="350" y="130" text-anchor="middle" fill="white" font-size="13" font-weight="600">arc-net</text>
  <text x="350" y="148" text-anchor="middle" fill="#bfdbfe" font-size="10">QUIC transport (quinn) | TLS 1.3 | Shred propagation | FEC | Gossip | PEX</text>

  <!-- Consensus -->
  <rect x="80" y="170" width="540" height="50" rx="8" fill="url(#cons)" opacity="0.9"/>
  <text x="350" y="192" text-anchor="middle" fill="white" font-size="13" font-weight="600">arc-consensus</text>
  <text x="350" y="210" text-anchor="middle" fill="#ddd6fe" font-size="10">DAG consensus | 2-round finality (~200ms) | VRF proposer | Slashing | Epochs</text>

  <!-- Node -->
  <rect x="110" y="232" width="480" height="50" rx="8" fill="url(#node)" opacity="0.9"/>
  <text x="350" y="254" text-anchor="middle" fill="white" font-size="13" font-weight="600">arc-node</text>
  <text x="350" y="272" text-anchor="middle" fill="#c7d2fe" font-size="10">Block production | 34 RPC endpoints | ETH JSON-RPC | STARK proof gen</text>

  <!-- State + VM side by side -->
  <rect x="50" y="296" width="290" height="55" rx="8" fill="url(#state)" opacity="0.9"/>
  <text x="195" y="318" text-anchor="middle" fill="white" font-size="13" font-weight="600">arc-state</text>
  <text x="195" y="336" text-anchor="middle" fill="#a7f3d0" font-size="10">DashMap | JMT | BlockSTM | WAL | GPU cache</text>

  <rect x="360" y="296" width="290" height="55" rx="8" fill="url(#vm)" opacity="0.9"/>
  <text x="505" y="318" text-anchor="middle" fill="white" font-size="13" font-weight="600">arc-vm</text>
  <text x="505" y="336" text-anchor="middle" fill="#fef3c7" font-size="10">EVM (revm 19) + WASM (Wasmer 6) | 11 precompiles</text>

  <!-- GPU + Inference + Crypto -->
  <rect x="50" y="365" width="190" height="55" rx="8" fill="url(#gpu)" opacity="0.9"/>
  <text x="145" y="387" text-anchor="middle" fill="white" font-size="12" font-weight="600">arc-gpu</text>
  <text x="145" y="405" text-anchor="middle" fill="#fecaca" font-size="9">Metal/WGSL Ed25519</text>
  <text x="145" y="415" text-anchor="middle" fill="#fecaca" font-size="9">379K sigs/sec</text>

  <rect x="255" y="365" width="190" height="55" rx="8" fill="url(#inf)" opacity="0.9"/>
  <text x="350" y="387" text-anchor="middle" fill="white" font-size="12" font-weight="600">arc-inference</text>
  <text x="350" y="405" text-anchor="middle" fill="#fbcfe8" font-size="9">Deterministic INT8 engine</text>
  <text x="350" y="415" text-anchor="middle" fill="#fbcfe8" font-size="9">76 ms/tok GPU | 139 ms/tok CPU</text>

  <rect x="460" y="365" width="190" height="55" rx="8" fill="url(#crypto)" opacity="0.9"/>
  <text x="555" y="387" text-anchor="middle" fill="white" font-size="12" font-weight="600">arc-crypto</text>
  <text x="555" y="405" text-anchor="middle" fill="#99f6e4" font-size="9">Ed25519 | Falcon-512 | BLS | STARK</text>
  <text x="555" y="415" text-anchor="middle" fill="#99f6e4" font-size="9">ML-DSA | VRF | BLAKE3</text>

  <!-- Bottom labels -->
  <rect x="50" y="435" width="600" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="165" y="455" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">contracts/</text>
  <text x="165" y="472" text-anchor="middle" fill="#64748b" font-size="9">ARC20 | ARC721 | Staking</text>
  <text x="350" y="455" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">agents/</text>
  <text x="350" y="472" text-anchor="middle" fill="#64748b" font-size="9">Oracle | Router | Sentiment</text>
  <text x="535" y="455" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">sdks/</text>
  <text x="535" y="472" text-anchor="middle" fill="#64748b" font-size="9">Python | TypeScript</text>
</svg>
