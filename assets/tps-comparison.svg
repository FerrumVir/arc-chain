<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, sans-serif">
  <rect width="700" height="380" rx="12" fill="#0f172a"/>

  <text x="350" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Transaction Throughput (Measured)</text>
  <text x="350" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">All numbers from production or testnet deployments, not theoretical maximums</text>

  <!-- Y axis -->
  <line x1="120" y1="70" x2="120" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Grid lines and labels -->
  <line x1="120" y1="320" x2="660" y2="320" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="115" y="324" text-anchor="end" fill="#64748b" font-size="10">0</text>

  <line x1="120" y1="270" x2="660" y2="270" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="115" y="274" text-anchor="end" fill="#64748b" font-size="10">50K</text>

  <line x1="120" y1="220" x2="660" y2="220" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="115" y="224" text-anchor="end" fill="#64748b" font-size="10">100K</text>

  <line x1="120" y1="170" x2="660" y2="170" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="115" y="174" text-anchor="end" fill="#64748b" font-size="10">150K</text>

  <line x1="120" y1="120" x2="660" y2="120" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="115" y="124" text-anchor="end" fill="#64748b" font-size="10">200K</text>

  <line x1="120" y1="70" x2="660" y2="70" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="115" y="74" text-anchor="end" fill="#64748b" font-size="10">250K</text>

  <!-- Bars -->

  <!-- Ethereum: 15 TPS (barely visible) -->
  <rect x="140" y="319.7" width="70" height="0.3" rx="2" fill="#627eea"/>
  <text x="175" y="312" text-anchor="middle" fill="#627eea" font-size="11" font-weight="600">~15</text>
  <text x="175" y="345" text-anchor="middle" fill="#94a3b8" font-size="10">Ethereum</text>
  <text x="175" y="358" text-anchor="middle" fill="#64748b" font-size="9">Mainnet</text>

  <!-- Solana: 4,000 TPS -->
  <rect x="240" y="316" width="70" height="4" rx="2" fill="#14f195"/>
  <text x="275" y="312" text-anchor="middle" fill="#14f195" font-size="11" font-weight="600">~4,000</text>
  <text x="275" y="345" text-anchor="middle" fill="#94a3b8" font-size="10">Solana</text>
  <text x="275" y="358" text-anchor="middle" fill="#64748b" font-size="9">Non-vote</text>

  <!-- Aptos: 12,000 TPS -->
  <rect x="340" y="308" width="70" height="12" rx="2" fill="#4dd0e1"/>
  <text x="375" y="302" text-anchor="middle" fill="#4dd0e1" font-size="11" font-weight="600">~12,000</text>
  <text x="375" y="345" text-anchor="middle" fill="#94a3b8" font-size="10">Aptos</text>
  <text x="375" y="358" text-anchor="middle" fill="#64748b" font-size="9">Peak</text>

  <!-- ARC Multi-node: 33,230 TPS -->
  <rect x="440" y="287" width="70" height="33" rx="2" fill="#a78bfa"/>
  <text x="475" y="280" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">33,230</text>
  <text x="475" y="345" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">ARC</text>
  <text x="475" y="358" text-anchor="middle" fill="#94a3b8" font-size="9">Multi-node</text>

  <!-- ARC Single-node: 183,000 TPS -->
  <rect x="540" y="137" width="70" height="183" rx="2" fill="#8b5cf6"/>
  <text x="575" y="130" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">183,000</text>
  <text x="575" y="345" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">ARC</text>
  <text x="575" y="358" text-anchor="middle" fill="#94a3b8" font-size="9">Single-node</text>

  <!-- Note -->
  <text x="350" y="375" text-anchor="middle" fill="#64748b" font-size="9">ARC: M2 Ultra + Vultr nodes, real DAG consensus, real QUIC. Others: public mainnet/testnet data.</text>
</svg>
