<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="gbase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" rx="12" fill="#0f172a"/>

  <text x="300" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">The Trust Stack</text>
  <text x="300" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">Each layer is a logical consequence of the layer below it</text>

  <!-- Layer 6: Certification -->
  <rect x="60" y="70" width="480" height="44" rx="6" fill="url(#g1)" opacity="0.9"/>
  <text x="300" y="90" text-anchor="middle" fill="white" font-size="13" font-weight="600">Certification</text>
  <text x="300" y="105" text-anchor="middle" fill="#c7d2fe" font-size="10">Regulatory approval transfers across all platforms</text>

  <!-- Arrow -->
  <text x="300" y="125" text-anchor="middle" fill="#64748b" font-size="11">&#x25B2; enabled by</text>

  <!-- Layer 5: Verification -->
  <rect x="80" y="132" width="440" height="44" rx="6" fill="url(#g2)" opacity="0.9"/>
  <text x="300" y="152" text-anchor="middle" fill="white" font-size="13" font-weight="600">Verification</text>
  <text x="300" y="167" text-anchor="middle" fill="#ddd6fe" font-size="10">Any party confirms any computation</text>

  <!-- Arrow -->
  <text x="300" y="187" text-anchor="middle" fill="#64748b" font-size="11">&#x25B2; enabled by</text>

  <!-- Layer 4: Attestation -->
  <rect x="100" y="194" width="400" height="44" rx="6" fill="url(#g3)" opacity="0.9"/>
  <text x="300" y="214" text-anchor="middle" fill="white" font-size="13" font-weight="600">Attestation</text>
  <text x="300" y="229" text-anchor="middle" fill="#ede9fe" font-size="10">Cryptographic commitment to (model, input, output)</text>

  <!-- Arrow -->
  <text x="300" y="249" text-anchor="middle" fill="#64748b" font-size="11">&#x25B2; enabled by</text>

  <!-- Layer 3: Consensus -->
  <rect x="120" y="256" width="360" height="44" rx="6" fill="url(#g4)" opacity="0.9"/>
  <text x="300" y="276" text-anchor="middle" fill="#1e1b4b" font-size="13" font-weight="600">Consensus</text>
  <text x="300" y="291" text-anchor="middle" fill="#4c1d95" font-size="10">Distributed nodes agree on output</text>

  <!-- Arrow -->
  <text x="300" y="311" text-anchor="middle" fill="#64748b" font-size="11">&#x25B2; enabled by</text>

  <!-- Layer 2: Determinism -->
  <rect x="140" y="318" width="320" height="44" rx="6" fill="url(#g5)" opacity="0.9"/>
  <text x="300" y="338" text-anchor="middle" fill="#1e1b4b" font-size="13" font-weight="600">Determinism</text>
  <text x="300" y="353" text-anchor="middle" fill="#4c1d95" font-size="10">Identical output on all hardware</text>

  <!-- Arrow -->
  <text x="300" y="373" text-anchor="middle" fill="#64748b" font-size="11">&#x25B2; enabled by</text>

  <!-- Layer 1: Integer Arithmetic (Foundation) -->
  <rect x="160" y="380" width="280" height="34" rx="6" fill="url(#gbase)"/>
  <text x="300" y="402" text-anchor="middle" fill="white" font-size="13" font-weight="700">Integer Arithmetic</text>
</svg>
