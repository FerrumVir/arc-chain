<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Wallet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:20px}
h1{font-size:24px;text-align:center;margin:20px 0;color:#fff}
h1 span{color:#6366f1}
.card{background:#13131f;border:1px solid #1e1e3a;border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.balance{font-size:36px;font-weight:700;color:#fff}
.balance small{font-size:14px;color:#888;font-weight:400}
.addr{font-size:11px;color:#6366f1;word-break:break-all;cursor:pointer;margin-top:8px}
.addr:hover{color:#818cf8}
input,select{width:100%;padding:12px;background:#0a0a0f;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:14px;margin-bottom:10px;outline:none}
input:focus{border-color:#6366f1}
button{width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
button:hover{background:#4f46e5}
button:disabled{background:#333;cursor:not-allowed}
button.secondary{background:transparent;border:1px solid #2a2a4a;color:#888}
button.secondary:hover{border-color:#6366f1;color:#fff}
.status{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px}
.status.ok{background:#0a2e1a;color:#4ade80;border:1px solid #166534}
.status.err{background:#2e0a0a;color:#f87171;border:1px solid #7f1d1d}
.status.info{background:#0a1a2e;color:#60a5fa;border:1px solid #1e3a5f}
.tx-list{max-height:200px;overflow-y:auto}
.tx-item{padding:8px 0;border-bottom:1px solid #1a1a2f;font-size:12px}
.tx-item .hash{color:#6366f1;font-family:monospace}
.tx-item .amount{float:right;font-weight:600}
.tx-item .amount.plus{color:#4ade80}
.tx-item .amount.minus{color:#f87171}
.net{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:16px;font-size:12px}
.net .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block}
.net .dot.off{background:#f87171}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:10px;text-align:center;background:#13131f;border:1px solid #1e1e3a;border-radius:8px;cursor:pointer;font-size:13px;color:#888}
.tab.active{border-color:#6366f1;color:#fff}
#app{display:none}
#setup{text-align:center;padding:40px 20px}
#setup p{color:#888;margin:16px 0}
</style>
</head>
<body>
<div class="container">
<h1><span>ARC</span> Wallet</h1>

<div class="net">
  <span class="dot" id="netDot"></span>
  <span id="netStatus">Connecting...</span>
</div>

<!-- Setup (no wallet) -->
<div id="setup">
  <div class="card">
    <h2>Get Started</h2>
    <p>Create a new wallet or import an existing one to start using ARC Chain testnet.</p>
    <button onclick="try{createWallet()}catch(e){alert('Error: '+e.message)}">Create New Wallet</button>
    <button class="secondary" onclick="showImport()">Import Private Key</button>
    <div id="importBox" style="display:none;margin-top:12px">
      <input type="password" id="importKey" placeholder="Paste 64-char hex private key">
      <button onclick="importWallet()">Import</button>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <!-- Balance -->
  <div class="card">
    <h2>Balance</h2>
    <div class="balance" id="bal">0 <small>ARC</small></div>
    <div class="addr" id="myAddr" onclick="copyAddr()" title="Click to copy"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('send',this)">Send</div>
    <div class="tab" onclick="switchTab('faucet',this)">Faucet</div>
    <div class="tab" onclick="switchTab('txs',this)">History</div>
  </div>

  <!-- Send -->
  <div id="tab-send" class="card">
    <h2>Send ARC</h2>
    <input id="sendTo" placeholder="Recipient address (64 hex chars)">
    <input id="sendAmt" type="number" placeholder="Amount" min="1">
    <button onclick="sendTx()">Send</button>
    <div id="sendStatus"></div>
  </div>

  <!-- Faucet -->
  <div id="tab-faucet" class="card" style="display:none">
    <h2>Claim Testnet Tokens</h2>
    <p style="color:#888;font-size:13px;margin-bottom:12px">Get 10,000 free ARC tokens for testing. One claim per hour.</p>
    <button onclick="claimFaucet()">Claim 10,000 ARC</button>
    <div id="faucetStatus"></div>
  </div>

  <!-- History -->
  <div id="tab-txs" class="card" style="display:none">
    <h2>Recent Transactions</h2>
    <div class="tx-list" id="txList"><p style="color:#666;font-size:13px">No transactions yet</p></div>
  </div>

  <button class="secondary" onclick="logout()" style="margin-top:8px;font-size:12px">Disconnect Wallet</button>
</div>
</div>

<script>
// ── Config ──
const NODES = [
  {name:'LAX', ip:'140.82.16.112'},
  {name:'AMS', ip:'136.244.109.1'},
  {name:'NRT', ip:'202.182.107.41'},
  {name:'NYC', ip:'149.28.32.76'},
  {name:'LHR', ip:'104.238.171.11'},
  {name:'SGP', ip:'149.28.153.31'},
  {name:'SAO', ip:'216.238.120.27'},
  {name:'JNB', ip:'139.84.237.49'},
];
let RPC = '';
let wallet = null; // {privKey, address}

// ── Startup ──
(async function init() {
  // Find a live node
  for (const n of NODES) {
    try {
      const r = await fetch(`http://${n.ip}:9090/health`, {signal: AbortSignal.timeout(3000)});
      if (r.ok) { RPC = `http://${n.ip}:9090`; break; }
    } catch(e) {}
  }
  if (RPC) {
    document.getElementById('netDot').className = 'dot';
    const h = await (await fetch(RPC+'/health')).json();
    document.getElementById('netStatus').textContent =
      `Connected to ARC Testnet (${h.validators} validators, round ${h.dag_round.toLocaleString()})`;
  } else {
    document.getElementById('netDot').className = 'dot off';
    document.getElementById('netStatus').textContent = 'Testnet unreachable';
  }
  // Check saved wallet
  const saved = localStorage.getItem('arc_wallet');
  if (saved) {
    wallet = JSON.parse(saved);
    showApp();
  }
})();

// ── Crypto ──
// Simple SHA-256 in JS (works on HTTP — crypto.subtle needs HTTPS)
function sha256(data) {
  const K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];
  const rr=(v,n)=>(v>>>n)|(v<<(32-n));
  let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
  const msg=new Uint8Array(data);const bl=msg.length*8;
  const pad=new Uint8Array(((msg.length+9+63)&~63));
  pad.set(msg);pad[msg.length]=0x80;
  const dv=new DataView(pad.buffer);dv.setUint32(pad.length-4,bl);
  for(let o=0;o<pad.length;o+=64){
    const w=new Int32Array(64);
    for(let i=0;i<16;i++)w[i]=dv.getInt32(o+i*4);
    for(let i=16;i<64;i++){const s0=rr(w[i-15],7)^rr(w[i-15],18)^(w[i-15]>>>3);const s1=rr(w[i-2],17)^rr(w[i-2],19)^(w[i-2]>>>10);w[i]=(w[i-16]+s0+w[i-7]+s1)|0;}
    let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
    for(let i=0;i<64;i++){const S1=rr(e,6)^rr(e,11)^rr(e,25);const ch=(e&f)^(~e&g);const t1=(h+S1+ch+K[i]+w[i])|0;const S0=rr(a,2)^rr(a,13)^rr(a,22);const mj=(a&b)^(a&c)^(b&c);const t2=(S0+mj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}
    h0=(h0+a)|0;h1=(h1+b)|0;h2=(h2+c)|0;h3=(h3+d)|0;h4=(h4+e)|0;h5=(h5+f)|0;h6=(h6+g)|0;h7=(h7+h)|0;
  }
  const out=new Uint8Array(32);const ov=new DataView(out.buffer);
  ov.setUint32(0,h0);ov.setUint32(4,h1);ov.setUint32(8,h2);ov.setUint32(12,h3);
  ov.setUint32(16,h4);ov.setUint32(20,h5);ov.setUint32(24,h6);ov.setUint32(28,h7);
  return out;
}
function toHex(bytes){return Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join('')}

function generateKeypair() {
  const privBytes = crypto.getRandomValues(new Uint8Array(32));
  const privKey = toHex(privBytes);
  const address = toHex(sha256(privBytes));
  return {privKey, address};
}

function createWallet() {
  wallet = generateKeypair();
  localStorage.setItem('arc_wallet', JSON.stringify(wallet));
  // Show private key in a copyable modal instead of alert()
  showKeyModal(wallet.privKey, wallet.address);
  showApp();
  // Auto-claim faucet, then refresh balance after it succeeds
  claimFaucet().then(() => { setTimeout(refreshBalance, 1000); });
}

function showKeyModal(privKey, address) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `<div style="background:#13131f;border:1px solid #6366f1;border-radius:12px;padding:24px;max-width:440px;width:100%">
    <h3 style="color:#f87171;font-size:16px;margin-bottom:12px">Save Your Private Key</h3>
    <p style="color:#888;font-size:13px;margin-bottom:16px">This is shown only once. Copy it now and store it safely.</p>
    <div style="background:#0a0a0f;border:1px solid #2a2a4a;border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="color:#888;font-size:11px;margin-bottom:4px">PRIVATE KEY (tap to copy)</div>
      <div id="pkDisplay" onclick="navigator.clipboard.writeText('${privKey}');this.style.color='#4ade80';this.textContent='Copied!';setTimeout(()=>{this.textContent='${privKey}';this.style.color='#f87171'},1500)" style="font-family:monospace;font-size:11px;color:#f87171;word-break:break-all;cursor:pointer;user-select:all">${privKey}</div>
    </div>
    <div style="background:#0a0a0f;border:1px solid #2a2a4a;border-radius:8px;padding:12px;margin-bottom:16px">
      <div style="color:#888;font-size:11px;margin-bottom:4px">YOUR ADDRESS</div>
      <div style="font-family:monospace;font-size:11px;color:#6366f1;word-break:break-all;user-select:all">${address}</div>
    </div>
    <button onclick="this.parentElement.parentElement.remove()" style="width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">I've Saved My Key</button>
  </div>`;
  document.body.appendChild(overlay);
}

function showImport() {
  document.getElementById('importBox').style.display = 'block';
}

function importWallet() {
  const key = document.getElementById('importKey').value.trim();
  if (key.length !== 64 || !/^[0-9a-f]+$/i.test(key)) {
    alert('Invalid key — must be 64 hex characters');
    return;
  }
  const privBytes = new Uint8Array(key.match(/.{2}/g).map(b=>parseInt(b,16)));
  const address = toHex(sha256(privBytes));
  wallet = {privKey: key, address};
  localStorage.setItem('arc_wallet', JSON.stringify(wallet));
  showApp();
}

function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('myAddr').textContent = wallet.address;
  refreshBalance();
}

function logout() {
  localStorage.removeItem('arc_wallet');
  wallet = null;
  document.getElementById('setup').style.display = 'block';
  document.getElementById('app').style.display = 'none';
}

function copyAddr() {
  navigator.clipboard.writeText(wallet.address);
  document.getElementById('myAddr').textContent = 'Copied!';
  setTimeout(() => document.getElementById('myAddr').textContent = wallet.address, 1500);
}

// ── Balance ──
async function refreshBalance() {
  if (!wallet || !RPC) return;
  try {
    const r = await fetch(`${RPC}/account/${wallet.address}`);
    if (r.ok) {
      const d = await r.json();
      document.getElementById('bal').innerHTML =
        `${(d.balance||0).toLocaleString()} <small>ARC</small>`;
    }
  } catch(e) {}
}
setInterval(refreshBalance, 5000);

// ── Send ──
async function sendTx() {
  const to = document.getElementById('sendTo').value.trim();
  const amt = parseInt(document.getElementById('sendAmt').value);
  const el = document.getElementById('sendStatus');
  if (!to || to.length!==64) { el.innerHTML='<div class="status err">Invalid address</div>'; return; }
  if (!amt || amt<=0) { el.innerHTML='<div class="status err">Invalid amount</div>'; return; }
  el.innerHTML='<div class="status info">Sending...</div>';
  try {
    const r = await fetch(`${RPC}/tx/submit`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({from:wallet.address, to, amount:amt, nonce:0})
    });
    const d = await r.json();
    if (r.ok) {
      el.innerHTML=`<div class="status ok">Sent! TX: ${d.tx_hash?.slice(0,16)}...</div>`;
      addTxToHistory({hash:d.tx_hash, to, amount:-amt});
      document.getElementById('sendTo').value='';
      document.getElementById('sendAmt').value='';
      refreshBalance();
    } else {
      el.innerHTML=`<div class="status err">${d.error||d.message||JSON.stringify(d)}</div>`;
    }
  } catch(e) { el.innerHTML=`<div class="status err">${e.message}</div>`; }
}

// ── Faucet ──
async function claimFaucet() {
  const el = document.getElementById('faucetStatus');
  el.innerHTML='<div class="status info">Claiming...</div>';
  try {
    const r = await fetch(`${RPC}/faucet/claim`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({address:wallet.address})
    });
    const d = await r.json();
    if (r.ok && d.tx_hash) {
      el.innerHTML=`<div class="status ok">Received ${d.amount||10000} ARC!</div>`;
      addTxToHistory({hash:d.tx_hash, from:'faucet', amount:d.amount||10000});
      refreshBalance();
    } else {
      el.innerHTML=`<div class="status err">${d.error||d.message||JSON.stringify(d)}</div>`;
    }
  } catch(e) { el.innerHTML=`<div class="status err">${e.message}</div>`; }
}

// ── Tabs ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['send','faucet','txs'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  if (name==='txs') loadHistory();
}

// ── History ──
let txHistory = JSON.parse(localStorage.getItem('arc_txs')||'[]');

function addTxToHistory(tx) {
  tx.time = Date.now();
  txHistory.unshift(tx);
  if (txHistory.length>50) txHistory=txHistory.slice(0,50);
  localStorage.setItem('arc_txs', JSON.stringify(txHistory));
}

function loadHistory() {
  const el = document.getElementById('txList');
  if (!txHistory.length) { el.innerHTML='<p style="color:#666;font-size:13px">No transactions yet</p>'; return; }
  el.innerHTML = txHistory.map(tx=>{
    const isIn = tx.amount > 0;
    const time = new Date(tx.time).toLocaleTimeString();
    return `<div class="tx-item">
      <span class="hash">${(tx.hash||'').slice(0,12)}...</span>
      <span class="amount ${isIn?'plus':'minus'}">${isIn?'+':''}${tx.amount} ARC</span>
      <br><span style="color:#555">${time}</span>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
