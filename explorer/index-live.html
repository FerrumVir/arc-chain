<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>ARC Chain Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#c0c8d4;font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:13px;padding:20px;max-width:960px;margin:0 auto}
h1{color:#60a5fa;font-size:20px;text-align:center;margin-bottom:4px}
.sub{color:#475569;font-size:11px;text-align:center;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.box{background:#111827;border:1px solid #1e2d3d;border-radius:6px;padding:12px;text-align:center}
.box .label{color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.box .val{color:#60a5fa;font-size:24px;font-weight:bold;margin-top:2px}
.box .val.green{color:#34d399}
.box .val.yellow{color:#fbbf24}
.sec{background:#111827;border:1px solid #1e2d3d;border-radius:6px;padding:14px;margin-bottom:12px}
.sec h2{color:#60a5fa;font-size:13px;margin-bottom:8px;border-bottom:1px solid #1e2d3d;padding-bottom:6px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;animation:pulse 2s infinite}
.dot.on{background:#34d399}
.dot.off{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nodes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.node{padding:6px 8px;border-radius:4px;font-size:11px;background:#0d1117;border:1px solid #1e2d3d}
.node.off{opacity:.4;border-color:#ef4444}
.node b{color:#34d399}
.node.off b{color:#ef4444}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:#475569;font-size:10px;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid #1e2d3d}
td{padding:4px 6px;border-bottom:1px solid #0d1117;font-size:12px}
tr.click:hover{background:#1e2d3d;cursor:pointer}
.hash{color:#60a5fa;font-size:11px}
.ok{color:#34d399}.fail{color:#ef4444}
.inf-card{background:#0d1117;border:1px solid #1e2d3d;border-radius:4px;padding:10px;margin:6px 0}
.inf-q{color:#fbbf24;font-size:12px}.inf-a{color:#34d399;font-size:12px;margin:3px 0}
.inf-meta{color:#475569;font-size:10px}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:10}
#modal-inner{max-width:600px;margin:80px auto;background:#111827;border:1px solid #1e2d3d;border-radius:6px;padding:16px}
#modal-close{float:right;cursor:pointer;color:#475569;font-size:18px}
#modal-body td:first-child{color:#475569;width:100px}
</style>
</head><body>
<h1>ARC CHAIN</h1>
<p class="sub">Agent Runtime Chain &mdash; 8 Nodes &bull; 6 Continents &bull; DAG Consensus</p>

<div class="grid">
  <div class="box"><div class="label">Block Height</div><div class="val" id="height">-</div></div>
  <div class="box"><div class="label">Live TPS</div><div class="val green" id="tps">-</div></div>
  <div class="box"><div class="label">Transactions</div><div class="val" id="txcount">-</div></div>
</div>
<div class="grid">
  <div class="box"><div class="label">Nodes Online</div><div class="val green" id="nodes-up">-</div></div>
  <div class="box"><div class="label">Validators</div><div class="val" id="vals">-</div></div>
  <div class="box"><div class="label">Uptime</div><div class="val yellow" id="uptime">-</div></div>
</div>

<div class="sec">
  <h2>Nodes</h2>
  <div class="nodes" id="node-grid"></div>
</div>

<div class="sec">
  <h2>Recent Transactions</h2>
  <table><thead><tr><th>Hash</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead>
  <tbody id="tx-list"><tr><td colspan="4" style="color:#475569">Loading...</td></tr></tbody></table>
</div>

<div class="sec">
  <h2>Inference Attestations</h2>
  <div id="inf-list"><span style="color:#475569">Loading...</span></div>
</div>

<div id="modal"><div id="modal-inner">
  <span id="modal-close" onclick="document.getElementById('modal').style.display='none'">&times;</span>
  <h2 style="color:#60a5fa;font-size:13px;margin-bottom:10px">Transaction</h2>
  <table id="modal-body"></table>
</div></div>

<script>
const NODES=[
  {n:'NYC',ip:'149.28.32.76',r:'US East'},
  {n:'LAX',ip:'140.82.16.112',r:'US West'},
  {n:'AMS',ip:'136.244.109.1',r:'Europe'},
  {n:'LHR',ip:'104.238.171.11',r:'Europe'},
  {n:'NRT',ip:'202.182.107.41',r:'Asia'},
  {n:'SGP',ip:'149.28.153.31',r:'Asia'},
  {n:'SAO',ip:'216.238.120.27',r:'S. America'},
  {n:'JNB',ip:'139.84.237.49',r:'Africa'},
];
const RPC=`http://${NODES[1].ip}:9090`; // LAX as primary

function f(url,ms=3000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal}).then(r=>{clearTimeout(t);return r.json()}).catch(()=>{clearTimeout(t);return null})}
function sh(h){return h?h.slice(0,8)+'...'+h.slice(-6):'?'}
function fmt(n){return n?n.toLocaleString():'0'}
function uptime(s){if(!s)return'-';if(s<3600)return Math.floor(s/60)+'m';return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m'}

let prevTx=0,prevT=Date.now();

async function tick(){
  // Query only LAX (fast, single request)
  const [stats,health,vals]=await Promise.all([f(RPC+'/stats'),f(RPC+'/health'),f(RPC+'/validators')]);
  if(stats){
    const now=Date.now();const dt=(now-prevT)/1000;const dtx=stats.total_transactions-prevTx;
    const tps=(prevTx>0&&dt>0)?Math.round(dtx/dt):0;
    prevTx=stats.total_transactions;prevT=now;
    document.getElementById('height').textContent=fmt(stats.block_height);
    document.getElementById('tps').textContent=fmt(tps);
    document.getElementById('txcount').textContent=fmt(stats.total_transactions);
  }
  if(health){document.getElementById('uptime').textContent=uptime(health.uptime_secs)}
  if(vals){document.getElementById('vals').textContent=vals.count+' / '+fmt(vals.total_stake)+' ARC'}
}

async function updateNodes(){
  const g=document.getElementById('node-grid');
  const ps=NODES.map(n=>f(`http://${n.ip}:9090/health`,2000));
  const hs=await Promise.all(ps);
  let up=0;
  g.innerHTML=NODES.map((n,i)=>{
    const h=hs[i];
    if(h){up++;return `<div class="node"><span class="dot on"></span><b>${n.n}</b> ${n.r}<br>Peers:${h.peers} Up:${uptime(h.uptime_secs)}</div>`}
    return `<div class="node off"><span class="dot off"></span><b>${n.n}</b> ${n.r}<br>OFFLINE</div>`
  }).join('');
  document.getElementById('nodes-up').textContent=up+'/8';
}

async function showTx(hash){
  const m=document.getElementById('modal');const b=document.getElementById('modal-body');
  b.innerHTML='<tr><td colspan="2" style="color:#475569">Loading...</td></tr>';m.style.display='block';
  const tx=await f(RPC+'/tx/'+hash+'/full',5000);
  if(!tx||!tx.tx_type){b.innerHTML='<tr><td colspan="2" style="color:#ef4444">Not found</td></tr>';return}
  const s=tx.success?'<span class="ok">SUCCESS</span>':'<span class="fail">FAILED</span>';
  const amt=tx.body&&tx.body.amount?fmt(tx.body.amount)+' ARC':'—';
  const to=tx.body&&tx.body.to?tx.body.to:'—';
  b.innerHTML=`
    <tr><td>Hash</td><td style="word-break:break-all;font-size:11px">${tx.tx_hash}</td></tr>
    <tr><td>Status</td><td>${s}</td></tr>
    <tr><td>Type</td><td>${tx.tx_type}</td></tr>
    <tr><td>From</td><td style="word-break:break-all;font-size:11px">${tx.from}</td></tr>
    <tr><td>To</td><td style="word-break:break-all;font-size:11px">${to}</td></tr>
    <tr><td>Amount</td><td style="color:#34d399">${amt}</td></tr>
    <tr><td>Nonce</td><td>${tx.nonce}</td></tr>
    <tr><td>Gas</td><td>${fmt(tx.gas_used)}</td></tr>
    <tr><td>Block</td><td>${tx.block_height||'—'}</td></tr>`;
}

async function updateTxs(){
  const el=document.getElementById('tx-list');
  // Get tx hashes from genesis account 0 (faucet source — has all tx history)
  const txs=await f(RPC+'/account/2d3adedff11b61f14c886e35afa036736dcd87a74d27b5c1510225d0f592e213/txs',3000);
  if(!txs||!txs.tx_hashes||txs.tx_hashes.length===0){el.innerHTML='<tr><td colspan="4" style="color:#475569">No transactions yet</td></tr>';return}
  const recent=txs.tx_hashes.slice(-12).reverse();
  const rows=[];
  for(const h of recent){
    const tx=await f(RPC+'/tx/'+h+'/full',2000);
    const type=tx?tx.tx_type:'?';
    const amt=tx&&tx.body&&tx.body.amount?fmt(tx.body.amount):'—';
    const s=tx?(tx.success?'<span class="ok">OK</span>':'<span class="fail">FAIL</span>'):'?';
    rows.push(`<tr class="click" onclick="showTx('${h}')"><td class="hash">${sh(h)}</td><td>${type}</td><td>${amt}</td><td>${s}</td></tr>`);
  }
  el.innerHTML=rows.join('');
}

async function updateInference(){
  const el=document.getElementById('inf-list');
  // Try nodes that might have models
  for(const node of NODES){
    const r=await f(`http://${node.ip}:9090/inference/attestations`,3000);
    if(r&&r.attestations&&r.attestations.length>0){
      el.innerHTML=r.attestations.slice(-5).reverse().map(a=>`
        <div class="inf-card">
          <div class="inf-q">Q: ${a.input||'—'}</div>
          <div class="inf-a">A: ${a.output||'—'}</div>
          <div class="inf-meta">Hash: ${sh(a.output_hash||'')} | ${a.ms_per_token||'?'} ms/tok | Model: ${sh(a.model_hash||'')}</div>
        </div>`).join('');
      return;
    }
  }
  el.innerHTML='<span style="color:#475569">No inference attestations on-chain yet</span>';
}

// Boot
tick();updateNodes();updateTxs();updateInference();
setInterval(tick,3000);
setInterval(updateNodes,15000);
setInterval(updateTxs,10000);
setInterval(updateInference,20000);
</script>
</body></html>
