# ARC Chain Genesis Configuration
# ─────────────────────────────────────────────────────────────────────────
# Defines the initial chain state for custom deployments.
# The hardcoded fallback (100 blake3-hashed accounts) is used when this file
# is not provided via --genesis.
#
# This template includes 10 prefunded accounts with real blake3 addresses.
# Add more accounts as needed for your deployment.
#
# Address derivation: blake3::hash(&[i]) for i in 0..N
# Each balance is 1 trillion ARC (1_000_000_000_000).
#
# Usage: arc-node --genesis genesis.toml

[chain]
name = "arc-testnet"
chain_id = "0x415243"  # "ARC" in ASCII hex

# ── Prefunded Genesis Accounts ──────────────────────────────────────────

